name: 🩺 监控所有项目 (Monitor All Projects)
permissions:
  contents: write



on:
  schedule:
    # 每 1 小时检测一次
    - cron: '0 */1 * * *'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.ACTION_TRIGGER_TOKEN }}
  REPO_PROJECT_1: 'FsEdu/fs-modal' # 仓库1
  URL_PROJECT_1: 'https://modal.kfc.pp.ua'
  DEPLOY_FILE_1: 'main.yml'
  
  # REPO_PROJECT_2: 'FsEdu/modal-SG' # 仓库2
  # URL_PROJECT_2: 'https://modal-jp.keyi.pp.ua'
  # DEPLOY_FILE_2: 'main.yml'
  
  REPO_PROJECT_3: 'FsEdu/modal-jp-aws' # 仓库3
  URL_PROJECT_3: 'https://jp-aws.modal.pp.ua'
  DEPLOY_FILE_3: 'main.yml'

jobs:
  check-all-projects:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 必须先拉取代码，才能修改仓库里的文件
      - name: 📥 获取当前仓库代码
        uses: actions/checkout@v4

      - name: 检查项目 1 (Check Project 1)
        id: check_1
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 $URL_PROJECT_1)
          echo "Project 1 Status: $HTTP_STATUS"
          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT

      # - name: 检查项目 2 (Check Project 2)
      #   id: check_2
      #   run: |
      #     HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 $URL_PROJECT_2)
      #     echo "Project 2 Status: $HTTP_STATUS"
      #     echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          
      - name: 检查项目 3 (Check Project 3)
        id: check_3
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 $URL_PROJECT_3)
          echo "Project 3 Status: $HTTP_STATUS"
          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT

      # --- 触发器部分 ---

      - name: 🔴 触发器 (Project 1)
        if: "!startsWith(steps.check_1.outputs.http_status, '2') && steps.check_1.outputs.http_status != '400'"
        run: |
          echo "Project 1 隧道不通 (Status: ${{ steps.check_1.outputs.http_status }}), 正在触发..."
          curl --fail -X POST -H "Accept: application/vnd.github.v3+json" -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/$REPO_PROJECT_1/actions/workflows/$DEPLOY_FILE_1/dispatches" -d '{"ref":"main"}'

      # - name: 🔴 触发器 (Project 2)
      #   if: "!startsWith(steps.check_2.outputs.http_status, '2') && steps.check_2.outputs.http_status != '400'"
      #   run: |
      #     echo "Project 2 隧道不通 (Status: ${{ steps.check_2.outputs.http_status }}), 正在触发..."
      #     curl --fail -X POST -H "Accept: application/vnd.github.v3+json" -H "Authorization: token $GITHUB_TOKEN" \
      #     "https://api.github.com/repos/$REPO_PROJECT_2/actions/workflows/$DEPLOY_FILE_2/dispatches" -d '{"ref":"main"}'
          
      - name: 🔴 触发器 (Project 3)
        if: "!startsWith(steps.check_3.outputs.http_status, '2') && steps.check_3.outputs.http_status != '400'"
        run: |
          echo "Project 3 隧道不通 (Status: ${{ steps.check_3.outputs.http_status }}), 正在触发..."
          curl --fail -X POST -H "Accept: application/vnd.github.v3+json" -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/repos/$REPO_PROJECT_3/actions/workflows/$DEPLOY_FILE_3/dispatches" -d '{"ref":"main"}'

      # --- 修改并保存文件部分 ---
      - name: 📝 更新并推送 time 文件
        run: |
          # 1. 将当前 UTC 时间和测试结果写入 time.txt (你可以按需修改文件名)
          echo "最后检查时间(UTC): $(date '+%Y-%m-%d %H:%M:%S')" > time.txt
          echo "项目 1 状态: ${{ steps.check_1.outputs.http_status }}" >> time.txt
          echo "项目 3 状态: ${{ steps.check_3.outputs.http_status }}" >> time.txt
          
          # 2. 配置 Git 机器人账号
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 3. 提交并推送
          git add time.txt
          # 检查是否有更改，如果有则提交。加上 [skip ci] 防止无限触发其他 workflow
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: 更新监控时间戳 [skip ci]"
          git push
